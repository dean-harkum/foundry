apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto
  labels:
    app: crypto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crypto
  template:
    metadata:
      labels:
        app: crypto
    spec:
      containers:
        - name: crypto
          image: dean-harkum/crypto-prices:latest
          env:
            - name: API_KEY
              value: ""
          ports:
            - containerPort: 8080
              name: crypto-http
